<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Government Is the Problem</title>
  <style>
    :root {
      color-scheme: dark;
      --white: #fff;
      --black: #000;
      --red: #ef1010;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--black);
      color: var(--white);
      font-family: "Arial Black", Impact, Haettenschweiler, sans-serif;
    }

    button {
      font: inherit;
    }

    .stage {
      position: fixed;
      inset: 0;
      isolation: isolate;
      background: var(--black);
    }

    .background {
      position: absolute;
      inset: -1px;
      z-index: -3;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      transform: scale(1.025);
      transition: none;
    }

    .background--color {
      background-image: url("reagan-color.png");
    }

    .background--mono {
      background-image: url("reagan-mono.png");
    }

    .stage.is-running .background.is-visible {
      opacity: 1;
    }

    .stage.is-running::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 32%, rgb(0 0 0 / 42%) 100%),
        repeating-linear-gradient(0deg, rgb(255 255 255 / 3%) 0 1px, transparent 1px 4px);
      mix-blend-mode: multiply;
    }

    .intro {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: clamp(1.5rem, 6vw, 6rem);
      border: 0;
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      text-align: center;
    }

    .intro__content {
      display: grid;
      justify-items: center;
      gap: clamp(2.5rem, 9vh, 7rem);
      width: min(100%, 72rem);
    }

    .intro__quote-wrap {
      display: grid;
      gap: 1.2rem;
    }

    .intro__quote {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.65rem, 4.1vw, 4.5rem);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.035em;
      text-wrap: balance;
    }

    .intro__credit {
      margin: 0;
      color: #a8a8a8;
      font-family: "Courier New", monospace;
      font-size: clamp(0.72rem, 1.4vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .intro__prompt {
      margin: 0;
      color: var(--red);
      font-family: "Courier New", monospace;
      font-size: clamp(0.95rem, 2.2vw, 1.5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: prompt-flash 0.72s steps(1, end) infinite;
    }

    .intro:focus-visible {
      outline: 2px solid var(--white);
      outline-offset: -8px;
    }

    .intro.is-leaving {
      animation: intro-out 0.16s steps(2, end) forwards;
      pointer-events: none;
    }

    .manifesto {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 3;
      display: grid;
      width: min(95vw, 95rem);
      margin: 0;
      padding: 0 clamp(0.75rem, 3vw, 2.5rem);
      transform: translate(-50%, -50%);
      color: var(--white);
      filter: drop-shadow(0 0 2px var(--black)) drop-shadow(0.16em 0.16em 0 var(--black));
      font-size: clamp(2.25rem, 6.4vw, 7rem);
      font-weight: 950;
      line-height: 0.92;
      letter-spacing: -0.055em;
      text-align: center;
      text-transform: uppercase;
      text-wrap: balance;
      pointer-events: none;
    }

    .manifesto__line {
      display: block;
      grid-area: 1 / 1;
      align-self: center;
      opacity: 0;
      visibility: hidden;
    }

    .manifesto__line.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .manifesto.is-stacked {
      gap: 0.2em;
    }

    .manifesto.is-stacked .manifesto__line {
      grid-area: auto;
    }

    .manifesto.is-red {
      color: var(--red);
      filter: drop-shadow(0 0 2px var(--white)) drop-shadow(0.12em 0.12em 0 var(--black));
    }

    .manifesto.is-shifted {
      transform: translate(calc(-50% + 0.025em), calc(-50% - 0.018em)) skewX(-2deg);
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
    }

    .stage.is-running .grain {
      opacity: 0.16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E");
      animation: grain-jump 0.17s steps(2, end) infinite;
      mix-blend-mode: screen;
    }

    .audio-fallback {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      z-index: 5;
      display: none;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--white);
      background: rgb(0 0 0 / 78%);
      color: var(--white);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .audio-fallback.is-visible {
      display: block;
    }

    @keyframes prompt-flash {
      0%, 44% { opacity: 1; }
      45%, 100% { opacity: 0.12; }
    }

    @keyframes intro-out {
      0% { opacity: 1; }
      49% { opacity: 0; }
      68% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes grain-jump {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-3%, 2%); }
      50% { transform: translate(2%, -4%); }
      75% { transform: translate(4%, 3%); }
      100% { transform: translate(-2%, -2%); }
    }

    @media (max-width: 680px) {
      .manifesto {
        font-size: clamp(2rem, 10.5vw, 4rem);
        line-height: 0.96;
      }

      .manifesto.is-stacked {
        gap: 0.34em;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="background background--color" id="backgroundColor" aria-hidden="true"></div>
    <div class="background background--mono" id="backgroundMono" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <button class="intro" id="intro" type="button" aria-label="Start the experience">
      <span class="intro__content">
        <span class="intro__quote-wrap">
          <span class="intro__quote" id="introQuote"></span>
          <span class="intro__credit">— Ronald Reagan</span>
        </span>
        <span class="intro__prompt">Click the screen.</span>
      </span>
    </button>

    <p class="manifesto" id="manifesto" aria-live="off">
      <span class="manifesto__line">Intervention is peace.</span>
      <span class="manifesto__line">Deregulation is freedom.</span>
      <span class="manifesto__line">Government is the problem.</span>
    </p>

    <button class="audio-fallback" id="audioFallback" type="button">Enable sound</button>
    <audio id="soundtrack" src="song.mp3" preload="auto" loop></audio>
  </main>

  <script>
    // Short excerpts verified against transcripts in the Ronald Reagan Presidential Library.
    const quotes = [
      "Government is not the solution to our problem; government is the problem.",
      "Government’s first duty is to protect the people, not run their lives.",
      "The best social program we can have is a job.",
      "If we lose freedom here, there’s no place to escape to.",
      "Freedom is a fragile thing and it’s never more than one generation away from extinction.",
      "The future doesn’t belong to the fainthearted; it belongs to the brave.",
      "The key is freedom — freedom of thought, freedom of information, freedom of communication.",
      "Status quo, you know, is Latin for ‘the mess we’re in.’",
      "Entrepreneurs and their small enterprises are responsible for almost all the economic growth in the United States.",
      "There is no such thing as a left or right. There’s only an up or down."
    ];

    const stage = document.querySelector("#stage");
    const intro = document.querySelector("#intro");
    const introQuote = document.querySelector("#introQuote");
    const manifesto = document.querySelector("#manifesto");
    const lines = [...document.querySelectorAll(".manifesto__line")];
    const backgrounds = [
      document.querySelector("#backgroundColor"),
      document.querySelector("#backgroundMono")
    ];
    const soundtrack = document.querySelector("#soundtrack");
    const audioFallback = document.querySelector("#audioFallback");

    let running = false;
    let activeBackground = 0;
    let backgroundTimer;
    let textTimer;

    introQuote.textContent = quotes[Math.floor(Math.random() * quotes.length)];

    // Pre-decode the supplied media so the first cut feels immediate.
    ["reagan-color.png", "reagan-mono.png"].forEach((source) => {
      const image = new Image();
      image.src = source;
    });

    function wait(ms) {
      return new Promise((resolve) => {
        textTimer = window.setTimeout(resolve, ms);
      });
    }

    function clearLines() {
      lines.forEach((line) => line.classList.remove("is-visible"));
      manifesto.classList.remove("is-stacked", "is-red", "is-shifted");
    }

    function showLines(indices, stacked = false) {
      clearLines();
      manifesto.classList.toggle("is-stacked", stacked);
      manifesto.classList.toggle("is-red", Math.random() < 0.18);
      manifesto.classList.toggle("is-shifted", Math.random() < 0.2);
      indices.forEach((index) => lines[index].classList.add("is-visible"));
    }

    async function flash(indices, repeats, onTime = 105, offTime = 65, stacked = false) {
      for (let count = 0; count < repeats && running; count += 1) {
        showLines(indices, stacked);
        await wait(onTime);
        clearLines();
        await wait(offTime);
      }
    }

    async function runTextSequence() {
      while (running) {
        const mode = Math.floor(Math.random() * 5);

        if (mode === 0) {
          await flash([0, 1, 2], 2 + Math.floor(Math.random() * 4), 90, 55, true);
        } else if (mode === 1) {
          for (let round = 0; round < 2 + Math.floor(Math.random() * 3); round += 1) {
            for (const index of [0, 1, 2]) {
              await flash([index], 1, 110, 52);
            }
          }
        } else if (mode === 2) {
          const index = Math.floor(Math.random() * 3);
          await flash([index], 3 + Math.floor(Math.random() * 5), 72, 48);
        } else if (mode === 3) {
          for (const index of [2, 1, 0, 1]) {
            await flash([index], 1, 95, 45);
          }
        } else {
          await flash([0, 1, 2], 1, 210, 65, true);
          await flash([Math.floor(Math.random() * 3)], 4, 65, 42);
        }

        clearLines();
        await wait(80 + Math.random() * 260);
      }
    }

    function startBackgroundCuts() {
      backgrounds[activeBackground].classList.add("is-visible");
      backgroundTimer = window.setInterval(() => {
        backgrounds[activeBackground].classList.remove("is-visible");
        activeBackground = activeBackground === 0 ? 1 : 0;
        backgrounds[activeBackground].classList.add("is-visible");
      }, 135);
    }

    async function playAudio() {
      soundtrack.volume = 1;
      try {
        await soundtrack.play();
        audioFallback.classList.remove("is-visible");
      } catch {
        audioFallback.classList.add("is-visible");
      }
    }

    function startExperience() {
      if (running) return;
      running = true;
      stage.classList.add("is-running");
      intro.classList.add("is-leaving");
      startBackgroundCuts();
      runTextSequence();
      playAudio();
    }

    intro.addEventListener("click", startExperience, { once: true });
    audioFallback.addEventListener("click", playAudio);

    window.addEventListener("pagehide", () => {
      running = false;
      window.clearInterval(backgroundTimer);
      window.clearTimeout(textTimer);
    });
  </script>
</body>
</html>
